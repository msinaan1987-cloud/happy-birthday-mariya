<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Our Future ❤️</title>

<link rel="stylesheet" href="../css/future.css">

</head>

<body>

<h1>

Our Future Together ❤️

</h1>

<p>

Every lantern holds one dream.

</p>

<div class="lanternArea">

<div class="lantern" data-text="Growing old together 🤍">🏮</div>

<div class="lantern" data-text="Watching the sunrise together 🌅">🏮</div>

<div class="lantern" data-text="Travelling the world together ✈️">🏮</div>

<div class="lantern" data-text="Supporting each other forever ❤️">🏮</div>

<div class="lantern" data-text="Building a beautiful little family one day 🏡">🏮</div>

</div>

<img
src="../assets/gifs/hug-cat.gif"
class="cat"
alt="Cat">

<div class="lockedBox">

<h2>

🔒 Letter For Mariya In 2036

</h2>

<p>

Type the secret sentence to unlock it.

</p>

<input
id="codeInput"
placeholder="Type here...">

<button id="unlockBtn">

Unlock Letter

</button>

<p class="hint">

Hint:<br>

Type <b>I LOVE YOU SINAAN FOR A 100 YEARS</b>

</p>

</div>

<div id="letterPopup">

<div class="paper">

<h2>

Letter For Mariya In 2036 ❤️

</h2>

<p id="futureLetter"></p>

<button id="closeLetter">

Close

</button>

</div>

</div>

<button id="nextBtn">

Open The Current Letter I've Written For You

</button>

<script src="../js/future.js"></script>

  <audio id="bgMusic" loop>
    <source src="../assets/music/harry-potter-theme.mp3" type="audio/mpeg">
</audio>

<script src="../js/music-manager.js"></script>
  
</body>

</html>
