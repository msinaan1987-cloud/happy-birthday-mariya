<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories ❤️</title>

<link rel="stylesheet" href="../css/photo.css">

</head>

<body>

<div class="container">

<h1>One Photo.</h1>

<h2>A Thousand Memories ❤️</h2>

<img
src="../assets/images/us.png"
class="photo"
alt="Our Photo">

<div class="giftArea">

<div class="gift" data-id="1">🎁</div>

<div class="gift" data-id="2">🎁</div>

<div class="gift" data-id="3">🎁</div>

<div class="gift" data-id="4">🎁</div>

</div>

<button id="continueBtn">

Continue ❤️

</button>

</div>

<div id="popup">

<div class="memoryCard">

<h2 id="memoryTitle"></h2>

<p id="memoryText"></p>

<button id="closeMemory">

Close

</button>

</div>

</div>

<script src="../js/photo.js"></script>
  
</body>
</html>
