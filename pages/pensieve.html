<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Pensieve</title>

<link rel="stylesheet" href="../css/pensieve.css">

</head>

<body>

<div class="particles"></div>

<h1>

The Pensieve

</h1>

<p class="subtitle">

Every memory with you is magical.

Choose one.

</p>

<div class="orbContainer">

<div class="orb" data-memory="award">

✨

<span>The Award Ceremony</span>

</div>

<div class="orb" data-memory="cycle">

🚲

<span>Cycle Ride</span>

</div>

<div class="orb" data-memory="sharpener">

🩹

<span>Sharpener Cut</span>

</div>

</div>

<div id="popup">

<div class="popupContent">

<h2 id="popupTitle"></h2>

<p id="popupText"></p>

<button id="closePopup">

Close

</button>

</div>

</div>

<button id="continueBtn">

Go On

</button>

<script src="../js/pensieve.js"></script>
  
</body>

</html>
