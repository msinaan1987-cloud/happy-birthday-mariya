<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mariya ❤️</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/mobile.css">

</head>

<body>

<!-- Harry Potter Music -->

<audio id="bgMusic" loop autoplay>
    <source src="assets/music/harry-potter-theme.mp3" type="audio/mpeg">
</audio>

<!-- Background -->

<div class="parchment"></div>

<div class="overlay"></div>

<!-- Floating Dust -->

<div class="dust dust1"></div>
<div class="dust dust2"></div>
<div class="dust dust3"></div>
<div class="dust dust4"></div>
<div class="dust dust5"></div>

<!-- Main Container -->

<div class="container">

    <!-- Quote -->

    <div id="quoteContainer">

        <h1 id="quote"></h1>

    </div>

    <!-- Reveal Button -->

    <button id="revealBtn">

        Reveal Secret Wand

    </button>

</div>

<!-- SVG Path -->

<div id="magicContainer">

<svg
id="magicSVG"
viewBox="0 0 1000 700"
preserveAspectRatio="none">

<path

id="magicPath"

d="

M70 600

C150 540 170 430 250 400

S400 250 520 280

S660 420 760 300

S880 170 930 230

"

></path>

</svg>

</div>

<!-- Footprints -->

<div id="footprints">

<span class="fp fp1">👣</span>

<span class="fp fp2">👣</span>

<span class="fp fp3">👣</span>

<span class="fp fp4">👣</span>

<span class="fp fp5">👣</span>

<span class="fp fp6">👣</span>

<span class="fp fp7">👣</span>

<span class="fp fp8">👣</span>

</div>

<!-- Final Message -->

<div id="finalMessage">

<h1 id="mariyaText">

Mariya ❤️

</h1>

<p id="subText">

There is something I want to show you.

</p>

<button id="startBtn">

Let's Start

</button>
    
</div>

<script src="js/music.js"></script>

<script src="js/typing.js"></script>

<script src="js/animation.js"></script>

<script src="js/main.js"></script>

</body>

</html>
